name: Build QEMU + Kernel via ATD Patcher

on:
  workflow_dispatch:
    inputs:
      brand:
        description: 'Brand name (exactly 4 chars)'
        required: false
        default: 'ASUS'
      target:
        description: 'Build target'
        required: false
        default: 'qemu'
        type: choice
        options:
          - qemu
          - kernel
          - all
      skip_release:
        description: 'Skip creating GitHub Release'
        required: false
        default: 'false'
        type: boolean

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions: write-all
    container: ghcr.io/pthyperdrive/pve-docker9:main
    env:
      TZ: Asia/Ho_Chi_Minh
    steps:
      # Step 1: Checkout
      - name: Checkout ATD repo
        uses: actions/checkout@v4

      # Step 2: Environment info
      - name: Environment info
        run: |
          echo "=== OS ==="
          cat /etc/os-release || true
          echo ""
          echo "=== Disk ==="
          df -h
          echo ""
          echo "=== RAM ==="
          free -m
          echo ""
          echo "=== Python ==="
          python3 --version
          echo ""
          echo "=== GCC ==="
          gcc --version | head -1
          echo ""
          echo "=== Target ==="
          echo "Build target: ${{ github.event.inputs.target || 'qemu' }}"

      # Step 3: Install build dependencies (QEMU + Kernel)
      - name: Install build dependencies
        run: |
          apt-get update -qq
          apt-get install -y -qq \
            build-essential git devscripts meson quilt \
            libacl1-dev libaio-dev libattr1-dev libcap-ng-dev \
            libcurl4-gnutls-dev libepoxy-dev libfdt-dev libgbm-dev \
            libgnutls28-dev libiscsi-dev libjpeg-dev libnuma-dev \
            libpci-dev libpixman-1-dev librbd-dev libsdl1.2-dev \
            libseccomp-dev libslirp-dev libspice-protocol-dev \
            libspice-server-dev libsystemd-dev liburing-dev \
            libusb-1.0-0-dev libusbredirparser-dev libvirglrenderer-dev \
            python3-sphinx python3-sphinx-rtd-theme xfslibs-dev \
            bc dosfstools mtools python3 python3-pexpect \
            uuid-dev curl pve-qemu-kvm:amd64 jq \
            dh-python asciidoc-base bison dwarves flex \
            libdw-dev libelf-dev libiberty-dev libslang2-dev \
            lz4 python3-dev xmlto rsync gawk

      # Step 4: Configure brand in profile
      - name: Configure brand
        if: ${{ github.event.inputs.brand != '' && github.event.inputs.brand != 'ASUS' }}
        run: |
          echo "Overriding brand to: ${{ github.event.inputs.brand }}"
          sed -i "s/^name=ASUS$/name=${{ github.event.inputs.brand }}/" profiles/default.conf
          grep 'name=' profiles/default.conf

      # Step 5: Run ATD Patcher
      - name: Run ATD Patcher
        run: |
          TARGET="${{ github.event.inputs.target || 'qemu' }}"
          echo "============================================="
          echo "  Running atd-patcher.sh --target ${TARGET}"
          echo "============================================="
          chmod +x atd-patcher.sh
          chmod +x lib/atd-styles.sh
          chmod +x patches/*.patch.sh
          bash atd-patcher.sh \
            --target "${TARGET}" \
            --profile profiles/default.conf \
            --verbose \
            --skip-cleanup

      # Step 6: Collect artifacts
      - name: Collect artifacts
        run: |
          TARGET="${{ github.event.inputs.target || 'qemu' }}"
          mkdir -p release-artifacts

          # QEMU artifacts
          if [ "${TARGET}" = "qemu" ] || [ "${TARGET}" = "all" ]; then
            find ./pve-emu-realpc-main/pve-qemu -maxdepth 1 -name "pve-qemu-kvm_*.deb" ! -name "*dbgsym*" -exec cp {} ./release-artifacts/ \;
            find . -name "qemu-autoGenPatch.patch" -exec cp {} ./release-artifacts/ \; 2>/dev/null || true

            # Copy ACPI tables
            for f in pve-emu-realpc-main/hpet.aml pve-emu-realpc-main/ssdt*.aml; do
              [ -f "$f" ] && cp "$f" ./release-artifacts/
            done
          fi

          # Kernel artifacts
          if [ "${TARGET}" = "kernel" ] || [ "${TARGET}" = "all" ]; then
            find . -path "*/pve-kernel/pve-kernel-*.deb" ! -name "*dbgsym*" -exec cp {} ./release-artifacts/ \;
            find . -path "*/pve-kernel/pve-headers-*.deb" -exec cp {} ./release-artifacts/ \; 2>/dev/null || true
          fi

          # Copy deploy scripts
          cp VM-Deployscripts/pve-realpc-setup.sh ./release-artifacts/ 2>/dev/null || true
          cp VM-Deployscripts/pve-realpc-deploy-vm.sh ./release-artifacts/ 2>/dev/null || true

          # Package Windows guest tools
          if [ -d "VM-Deployscripts/windows" ]; then
            apt-get install -y -qq zip 2>/dev/null || true
            ( cd VM-Deployscripts && zip -qr ../release-artifacts/windows-guest-tools.zip windows/ ) || true
          fi

          echo ""
          echo "=== Artifacts ==="
          ls -lh release-artifacts/
          echo ""
          echo "=== .deb packages ==="
          for deb in release-artifacts/*.deb; do
            [ -f "$deb" ] && echo "--- $(basename $deb) ---" && dpkg-deb -I "$deb" 2>/dev/null | head -10
          done

      # Step 7: Upload artifacts
      - name: Upload artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: pve-atd-${{ github.event.inputs.target || 'qemu' }}
          path: release-artifacts/*

      # Step 7b: Upload build logs (always, even on failure)
      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            build-logs/
            *.log
          if-no-files-found: ignore

      # Step 8: Get current time for release tag
      - name: Get current time
        if: ${{ github.event.inputs.skip_release != 'true' }}
        id: current-time
        uses: josStorer/get-current-time@v2.0.2
        with:
          format: YYYYMMDD-HHmmSS
          utcOffset: "+07:00"

      # Step 9: Create GitHub Release
      - name: Create GitHub Release
        if: ${{ github.event.inputs.skip_release != 'true' }}
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ format('{0}-v{1}', github.event.inputs.target || 'qemu', steps.current-time.outputs.formattedTime) }}
          release_name: ${{ format('ATD {0} build-{1}', github.event.inputs.target || 'qemu', steps.current-time.outputs.formattedTime) }}
          body: |
            ## Proxmox Anti-Detection Build (via ATD Patcher)

            **Target:** `${{ github.event.inputs.target || 'qemu' }}`
            **Toolchain:** GCC5 (Proxmox 9 container)

            ### Included
            - `pve-qemu-kvm` .deb package (if QEMU target)
            - `pve-kernel` .deb package with RDTSC patch (if kernel target)
            - ACPI tables (hpet.aml, ssdt.aml, ssdt-battery.aml, ssdt-ec.aml)

            ### RDTSC Kernel Patch
            Intercepts `RDTSC`/`RDTSCP` instructions in KVM (both Intel VMX and AMD SVM)
            to prevent timing-based hypervisor detection. Includes `UMWAIT`/`TPAUSE` handlers.

            ### Installation
            ```bash
            # QEMU
            dpkg -i pve-qemu-kvm_*.deb

            # Kernel (requires reboot)
            dpkg -i pve-kernel-*.deb pve-headers-*.deb
            reboot

            # ACPI tables
            cp *.aml /usr/share/kvm/
            ```
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Step 10: Upload artifacts to Release
      - name: Upload artifacts to release
        if: ${{ github.event.inputs.skip_release != 'true' }}
        run: |
          for file in ${GITHUB_WORKSPACE}/release-artifacts/*; do
            [ -f "$file" ] || continue  # skip directories
            echo "Uploading $(basename $file) ..."
            curl -sS -X POST \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              -H "Content-Type: application/octet-stream" \
              --data-binary @"$file" \
              "https://uploads.github.com/repos/${{ github.repository }}/releases/${{ steps.create_release.outputs.id }}/assets?name=$(basename $file)"
          done
          echo ""
          echo "=== Upload complete ==="
